server {
    listen 8443 ssl;
    ssl_certificate     /etc/nginx/certs/sidecar.crt;
    ssl_certificate_key /etc/nginx/certs/sidecar.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://memu-sidecar:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }
}
