services:
  memu-postgres:
    image: pgvector/pgvector:pg16
    container_name: memu-postgres
    restart: unless-stopped
    networks:
      - nanoclaw-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - memu-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  memu-sidecar:
    build:
      context: ./memu-framework
      dockerfile: Dockerfile.sidecar
    container_name: memu-sidecar
    restart: unless-stopped
    networks:
      - nanoclaw-net
    depends_on:
      memu-postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: memu-postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      EMBED_MODEL: ${EMBED_MODEL}
      MEMU_API_KEY: ${MEMU_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:8100:8100"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  memu-tls-proxy:
    image: nginx:alpine
    container_name: memu-tls-proxy
    restart: unless-stopped
    networks:
      - nanoclaw-net
      - default
    depends_on:
      memu-sidecar:
        condition: service_healthy
    volumes:
      - ./nginx-sidecar.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "0.0.0.0:8443:8443"
    healthcheck:
      test: ["CMD", "curl", "-sfk", "https://localhost:8443/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  nanoclaw-net:
    external: true
  default:

volumes:
  memu-pgdata:
